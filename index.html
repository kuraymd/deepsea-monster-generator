<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<title>Abyssal Monster Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Deep Sea Monster Generator</h1>

<button onclick="generateMonster()">モンスター生成</button>

<div id="result">

<svg id="silhouetteImage"></svg>

<p><b>標本No</b> <span id="specimen"></span></p>
<p><b>名前</b> <span id="name"></span></p>
<p><b>体型</b> <span id="silhouette"></span></p>
<p><b>モチーフ</b> <span id="motif"></span></p>
<p><b>危険度</b> <span id="danger"></span></p>
<p><b>サイズ</b> <span id="size"></span></p>
<p><b>生息深度</b> <span id="depth"></span></p>
<p><b>特徴</b> <span id="feature"></span></p>
<p><b>能力</b> <span id="ability"></span></p>

<p id="description"></p>

</div>

<script src="creatures.js"></script>
<script src="script.js"></script>

</body>

</html>
