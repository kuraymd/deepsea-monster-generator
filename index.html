<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abyssal Monster Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04090f;
    --surface: #080f1a;
    --accent: #00e5ff;
    --accent2: #0077aa;
    --danger: #ff2244;
    --text: #c8dde8;
    --text-dim: #5a7a8a;
    --border: #0d2233;
    --gold: #c8a84b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(0,80,120,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,40,80,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 500px; }
  header { text-align: center; margin-bottom: 28px; }
  .label-en {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 4px; color: var(--accent2); margin-bottom: 8px;
  }
  h1 { font-size: clamp(17px, 5vw, 24px); font-weight: 700; color: #fff; letter-spacing: 0.05em; line-height: 1.5; }
  .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); margin: 14px auto; }

.btn-generate {
display: block; width: 100%; padding: 16px;
font-family: ‘Noto Serif JP’, serif; font-size: 15px; font-weight: 700;
letter-spacing: 0.15em; color: #fff;
background: linear-gradient(135deg, #004466, #006688);
border: 1px solid var(–accent2); border-radius: 4px;
cursor: pointer; position: relative; overflow: hidden;
transition: all 0.3s; margin-bottom: 24px;
animation: flicker 7s infinite;
}
.btn-generate::before {
content: ‘’; position: absolute; top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(0,229,255,0.12), transparent);
transition: left 0.5s;
}
.btn-generate:hover::before { left: 100%; }
.btn-generate:hover { border-color: var(–accent); box-shadow: 0 0 20px rgba(0,229,255,0.2); }
.btn-generate:active { transform: scale(0.98); }

#result { opacity: 0; transform: translateY(12px); transition: opacity 0.5s, transform 0.5s; }
#result.visible { opacity: 1; transform: translateY(0); }

.svg-wrap {
background: #02060d; display: flex; align-items: center; justify-content: center;
padding: 24px; border: 1px solid var(–border); border-radius: 6px 6px 0 0;
position: relative; overflow: hidden;
}
.svg-wrap::after {
content: ‘’; position: absolute; inset: 0;
background: radial-gradient(ellipse at center, rgba(0,80,120,0.2) 0%, transparent 70%);
pointer-events: none;
}
svg.monster-svg {
width: min(240px, 65vw); height: min(210px, 57vw);
fill: #1a4060; stroke: var(–accent); stroke-width: 1.5;
filter: drop-shadow(0 0 8px rgba(0,229,255,0.35));
position: relative; z-index: 1;
}
.specimen-header {
padding: 12px 16px; background: var(–surface);
border-left: 1px solid var(–border); border-right: 1px solid var(–border);
display: flex; justify-content: space-between; align-items: center;
flex-wrap: wrap; gap: 8px;
}
.specimen-no { font-family: ‘Share Tech Mono’, monospace; font-size: 11px; color: var(–accent2); letter-spacing: 2px; }
.danger-badge {
font-family: ‘Share Tech Mono’, monospace; font-size: 12px; font-weight: bold;
padding: 3px 10px; border-radius: 2px; border: 1px solid var(–danger); color: var(–danger); letter-spacing: 2px;
}
.monster-name {
padding: 12px 16px; font-size: clamp(17px, 5vw, 21px); font-weight: 700; color: #fff;
background: var(–surface);
border-left: 1px solid var(–border); border-right: 1px solid var(–border); border-top: 1px solid var(–border);
}
.data-grid {
display: grid; grid-template-columns: 1fr 1fr;
background: var(–surface); border: 1px solid var(–border); border-top: none;
}
.data-item { padding: 11px 14px; border-top: 1px solid var(–border); border-right: 1px solid var(–border); }
.data-item:nth-child(even) { border-right: none; }
.data-item.full { grid-column: 1 / -1; border-right: none; }
.data-label { font-family: ‘Share Tech Mono’, monospace; font-size: 9px; letter-spacing: 2px; color: var(–text-dim); margin-bottom: 4px; }
.data-value { font-size: 13px; color: var(–text); line-height: 1.5; }
.description {
padding: 14px 16px; font-size: 11px; line-height: 2; color: var(–text-dim);
white-space: pre-line; background: var(–surface);
border: 1px solid var(–border); border-top: none; border-radius: 0 0 6px 6px;
font-family: ‘Share Tech Mono’, monospace; letter-spacing: 0.05em;
}

/* 和柄カード */
.wagara-section {
margin-top: 20px; background: var(–surface);
border: 1px solid var(–border); border-radius: 6px; overflow: hidden;
}
.wagara-header {
padding: 10px 16px; border-bottom: 1px solid var(–border);
display: flex; align-items: center;
}
.wagara-title-label { font-family: ‘Share Tech Mono’, monospace; font-size: 9px; letter-spacing: 3px; color: var(–accent2); }
.wagara-body { padding: 16px; display: flex; gap: 16px; align-items: flex-start; }
.wagara-preview {
flex-shrink: 0;
width: min(110px, 30vw); height: min(110px, 30vw);
border: 1px solid var(–border); border-radius: 4px;
overflow: hidden; background: #02060d;
}
.wagara-preview svg { width: 100%; height: 100%; }
.wagara-info { flex: 1; min-width: 0; }
.wagara-name-ja { font-size: clamp(16px, 4.5vw, 20px); font-weight: 700; color: var(–gold); margin-bottom: 2px; letter-spacing: 0.1em; }
.wagara-name-read { font-family: ‘Share Tech Mono’, monospace; font-size: 10px; color: var(–text-dim); letter-spacing: 2px; margin-bottom: 10px; }
.wagara-meaning { font-size: 12px; color: var(–text); line-height: 1.8; margin-bottom: 8px; }
.wagara-reason { font-size: 11px; color: var(–accent2); line-height: 1.7; border-left: 2px solid var(–accent2); padding-left: 8px; }

.placeholder {
padding: 48px 24px; text-align: center;
border: 1px solid var(–border); border-radius: 6px; background: var(–surface);
}
.placeholder-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.25; }
.placeholder-text { font-family: ‘Share Tech Mono’, monospace; font-size: 10px; color: var(–text-dim); letter-spacing: 3px; }

@keyframes flicker {
0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.6} 94%{opacity:1}
}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="label-en">IHYLI — ABYSSAL RESEARCH DIVISION</div>
    <h1>深海異常体<br>標本生成システム</h1>
    <div class="divider"></div>
  </header>
  <button class="btn-generate" onclick="generateMonster()">▶ 標本を生成する</button>
  <div id="result">
    <div class="placeholder">
      <div class="placeholder-icon">🌊</div>
      <div class="placeholder-text">AWAITING SPECIMEN DATA...</div>
    </div>
  </div>
</div>
<script>
const silhouettes = ["クラゲ型","イカ型","タコ型","魚型","ヒトデ型","蛇状型","球体型","浮遊体型"];
const motifs = ["チョウチンアンコウ","リュウグウノツカイ","ダイオウイカ","オオグソクムシ","ダンゴムシエビ","ダンゴクラゲ","ミツクリザメ","デメニギス","ダイオウグソクムシ","バケダコ"];
const colors = ["バイオルミネセンスブルー","深海パープル","発光シアン","暗黒レッド","透明ホワイト","毒グリーン","虹色発光","黒光り"];
const features = ["体内に強い発光器官を持つ","触手が無数に伸びている","巨大な捕食口を持つ","骨格が外部に露出している","目が存在しない","大量の目を持つ","透明な体を持つ","外殻が非常に硬い","影のように揺らめく"];
const abilities = ["発光による幻惑","触手による拘束","深海毒","擬態","高速突進","精神干渉","電撃放出","光吸収"];
const danger = ["C","B","A","S","SS"];
const size = ["30cm","1m","3m","5m","10m","20m"];
const depth = ["200m","500m","1000m","3000m","6000m","海底"];
function randomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randomSpecimen(){ return Math.floor(Math.random()*900)+100; }

// 和柄データ（タグでモンスター要素とマッチング）
const wagara = [
{
name:“青海波”, read:“せいかいは”,
meaning:“波が重なり無限に広がるパターン。海の穏やかさと永遠の繁栄を象徴する。”,

drawFn: drawSeigaiha
},
{
name:“鱗文”, read:“うろこもん”,
meaning:“三角形を連続させた鱗のパターン。魔除け・再生・変容を象徴する。”,
tags:[“外殻が非常に硬い”,“骨格が外部に露出している”,“魚型”,“ミツクリザメ”,“擬態”],

},
{
name:“亀甲”, read:“きっこう”,

tags:[“外殻が非常に硬い”,“オオグソクムシ”,“ダイオウグソクムシ”,“ダンゴムシエビ”,“骨格が外部に露出している”],

},
{
name:“七宝”, read:“しっぽう”,
meaning:“円が連鎖して広がるパターン。縁・連鎖・つながりを象徴する。”,

drawFn: drawShippō
},
{
name:“立涌”, read:“たてわく”,
meaning:“蒸気が立ち昇る様を表した曲線模様。上昇・発光・エネルギーを象徴する。”,
tags:[“体内に強い発光器官を持つ”,“発光による幻惑”,“電撃放出”,“チョウチンアンコウ”,“浮遊体型”],
drawFn: drawTatewaku
},
{
name:“観世水”, read:“かんぜみず”,
meaning:“水が渦を巻くパターン。深淵・幻惑・精神の揺らぎを象徴する。”,
tags:[“精神干渉”,“発光による幻惑”,“影のように揺らめく”,“深海毒”,“蛇状型”],
drawFn: drawKanzemizu
},
{
name:“麻の葉”, read:“あさのは”,
meaning:“六角形の幾何学模様。成長・魔除け・生命力を象徴する。”,
tags:[“深海毒”,“ヒトデ型”,“目が存在しない”,“球体型”,“光吸収”],
drawFn: drawAsanoha
},
{
name:“流水文”, read:“りゅうすいもん”,
meaning:“川や海流の流れを描いたパターン。変幻自在・得体の知れなさを象徴する。”,
tags:[“擬態”,“影のように揺らめく”,“透明な体を持つ”,“蛇状型”,“リュウグウノツカイ”,“高速突進”],
drawFn: drawRyūsui
},
{
name:“霞文”, read:“かすみもん”,
meaning:“霞や靄を表したパターン。神秘・隠蔽・不可視を象徴する。”,
tags:[“擬態”,“透明な体を持つ”,“目が存在しない”,“発光による幻惑”,“デメニギス”],
drawFn: drawKasumi
},
{
name:“蛸唐草”, read:“たこからくさ”,
meaning:“触手が草花のように絡み合う唐草模様。絡みつき・捕食・深海の魔を象徴する。”,
tags:[“触手が無数に伸びている”,“触手による拘束”,“巨大な捕食口を持つ”,“タコ型”,“バケダコ”,“ダイオウイカ”,“イカ型”],
drawFn: drawTakoKarakusa
},
{
name:“籠目”, read:“かごめ”,
meaning:“六芒星が連なる格子状のパターン。魔除け・結界・封印を象徴する。”,
tags:[“目が存在しない”,“大量の目を持つ”,“光吸収”,“精神干渉”,“球体型”,“ヒトデ型”],

drawFn: drawYagasuri
},
{

meaning:“卍を崩した連続模様。不断・永続・終わりなき増殖を象徴する。”,

drawFn: drawSayagata
},
{
name:“千鳥”, read:“ちどり”,
meaning:“千の鳥が群れ飛ぶパターン。群体・無数の存在・集合体を象徴する。”,
tags:[“大量の目を持つ”,“触手が無数に伸びている”,“ダンゴクラゲ”,“ダンゴムシエビ”,“クラゲ型”],
drawFn: drawChidori
},
{
name:“雪輪”, read:“ゆきわ”,
meaning:“雪の結晶を輪にした文様。深海の冷気・静寂・凍結を象徴する。”,
tags:[“透明な体を持つ”,“浮遊体型”,“球体型”,“深海毒”,“デメニギス”],
drawFn: drawYukiwa
},
{
name:“梅鉢”, read:“うめばち”,
meaning:“梅の花を図案化した五弁の紋様。毒の美しさ・危険な魅力を象徴する。”,
tags:[“深海毒”,“発光による幻惑”,“チョウチンアンコウ”,“体内に強い発光器官を持つ”,“ヒトデ型”],
drawFn: drawUmebachi
},
{
name:“工字繋”, read:“こうじつなぎ”,
meaning:“工の字が連なる幾何学模様。骨格・硬質な構造・機械的精巧さを象徴する。”,
tags:[“骨格が外部に露出している”,“外殻が非常に硬い”,“オオグソクムシ”,“ダイオウグソクムシ”],
drawFn: drawKōji
},
{

meaning:“二色の正方形が交互に並ぶパターン。二面性・変化・擬態を象徴する。”,
tags:[“擬態”,“影のように揺らめく”,“透明な体を持つ”,“精神干渉”,“バケダコ”],
drawFn: drawIchimatsu
},
{
name:“組亀甲”, read:“くみきっこう”,
meaning:“亀甲が二重に重なった複雑な六角形模様。進化した防御・二重構造・不死を象徴する。”,
tags:[“外殻が非常に硬い”,“骨格が外部に露出している”,“ダイオウグソクムシ”,“オオグソクムシ”,“光吸収”],
drawFn: drawKumiKikkō
},
{
name:“波千鳥”, read:“なみちどり”,
meaning:“波の上を千鳥が群れ飛ぶ文様。深海を漂う群体・波に乗る無数の存在を象徴する。”,
tags:[“クラゲ型”,“ダンゴクラゲ”,“大量の目を持つ”,“影のように揺らめく”,“浮遊体型”,“電撃放出”],
drawFn: drawNamiChidori
}
];

function selectWagara(motif, feature, ability, silhouette) {
const scores = wagara.map(w => {
let score = 0;
const targets = [motif, feature, ability, silhouette];
w.tags.forEach(tag => {
targets.forEach(t => {
if (t === tag || t.includes(tag) || tag.includes(t)) score += 3;
});
});
score += Math.random() * 1.5; // わずかなランダム性
return { w, score };
});
scores.sort((a,b) => b.score - a.score);
// スコア上位2〜3件からランダム選択（多様性のため）
const pool = scores.slice(0, scores[0].score > 3 ? 2 : 3);
return pool[Math.floor(Math.random() * pool.length)].w;
}

function buildReason(w, motif, feature, ability) {
const targets = [motif, feature, ability];
const matched = w.tags.find(tag => targets.some(t => t.includes(tag) || tag.includes(t)));
if (matched) return `「${matched}」の性質がこの標本と共鳴している。`;
return “この標本の深層的な性質と共鳴している。”;
}

function generateMonster(){
const specimen = randomSpecimen();
const silhouette = randomItem(silhouettes);
const motif = randomItem(motifs);
const color = randomItem(colors);
const feature = randomItem(features);
const ability = randomItem(abilities);
const dangerLevel = randomItem(danger);
const monsterSize = randomItem(size);
const habitat = randomItem(depth);
const name = motif + “型異常体”;
const description =
`標本No.${specimen}
深度${habitat}で確認された異常深海生物。

${motif}に類似した体構造を持ち、
体色は${color}。

${feature}特徴があり、
主な能力は「${ability}」。

危険度は${dangerLevel}と分類されている。`;

const selected = selectWagara(motif, feature, ability, silhouette);
const reason = buildReason(selected, motif, feature, ability);

const result = document.getElementById(“result”);
result.classList.remove(“visible”);
setTimeout(() => {
result.innerHTML = ` <div class="svg-wrap"> <svg class="monster-svg" id="silhouetteImage" viewBox="0 0 300 260"></svg> </div> <div class="specimen-header"> <span class="specimen-no">SPECIMEN NO.${specimen}</span> <span class="danger-badge">DANGER: ${dangerLevel}</span> </div> <div class="monster-name">${name}</div> <div class="data-grid"> <div class="data-item"><div class="data-label">BODY TYPE</div><div class="data-value">${silhouette}</div></div> <div class="data-item"><div class="data-label">MOTIF</div><div class="data-value">${motif}</div></div> <div class="data-item"><div class="data-label">SIZE</div><div class="data-value">${monsterSize}</div></div> <div class="data-item"><div class="data-label">DEPTH</div><div class="data-value">${habitat}</div></div> <div class="data-item full"><div class="data-label">FEATURE</div><div class="data-value">${feature}</div></div> <div class="data-item full"><div class="data-label">ABILITY</div><div class="data-value">${ability}</div></div> </div> <div class="description">${description}</div> <div class="wagara-section"> <div class="wagara-header"> <span class="wagara-title-label">ASSOCIATED PATTERN — 紋様診断</span> </div> <div class="wagara-body"> <div class="wagara-preview" id="wagaraPreview"></div> <div class="wagara-info"> <div class="wagara-name-ja">${selected.name}</div> <div class="wagara-name-read">${selected.read}</div> <div class="wagara-meaning">${selected.meaning}</div> <div class="wagara-reason">▶ ${reason}</div> </div> </div> </div>`;
drawSilhouette(silhouette);
drawWagaraPreview(selected);
requestAnimationFrame(() => result.classList.add(“visible”));
}, 100);
}

function drawSilhouette(type){
const svg = document.getElementById(“silhouetteImage”);
let s = “”;
switch(type){
case “クラゲ型”: s=`<ellipse cx="150" cy="110" rx="70" ry="60"/><line x1="110" y1="165" x2="100" y2="245"/><line x1="130" y1="168" x2="128" y2="245"/><line x1="150" y1="170" x2="150" y2="245"/><line x1="170" y1="168" x2="172" y2="245"/><line x1="190" y1="165" x2="200" y2="245"/>`;break;
case “イカ型”: s=`<polygon points="150,50 210,160 90,160"/><line x1="100" y1="160" x2="85" y2="245"/><line x1="120" y1="160" x2="115" y2="245"/><line x1="140" y1="160" x2="140" y2="245"/><line x1="160" y1="160" x2="160" y2="245"/><line x1="180" y1="160" x2="185" y2="245"/><line x1="200" y1="160" x2="215" y2="245"/>`;break;
case “タコ型”: s=`<circle cx="150" cy="110" r="60"/><line x1="100" y1="155" x2="75" y2="245"/><line x1="120" y1="165" x2="105" y2="245"/><line x1="140" y1="170" x2="135" y2="245"/><line x1="160" y1="170" x2="165" y2="245"/><line x1="180" y1="165" x2="195" y2="245"/><line x1="200" y1="155" x2="225" y2="245"/>`;break;
case “魚型”: s=`<ellipse cx="140" cy="140" rx="90" ry="45"/><polygon points="220,140 270,105 270,175"/>`;break;
case “ヒトデ型”: s=`<polygon points="150,40 178,125 265,125 195,178 222,262 150,210 78,262 105,178 35,125 122,125"/>`;break;
case “蛇状型”: s=`<path d="M30 200 Q110 80 190 200 T310 200" stroke-width="28" fill="none"/>`;break;
case “球体型”: s=`<circle cx="150" cy="140" r="85"/><ellipse cx="150" cy="140" rx="85" ry="30" fill="none" opacity="0.4"/>`;break;
case “浮遊体型”: s=`<ellipse cx="150" cy="130" rx="55" ry="90"/><ellipse cx="150" cy="130" rx="35" ry="60" fill="none" opacity="0.4"/>`;break;
}
svg.innerHTML = s;
}

function drawWagaraPreview(w) {
const container = document.getElementById(“wagaraPreview”);
const ns = “http://www.w3.org/2000/svg”;

// 梅鉢：五弁の花
function drawUmebachi(svg, ns) {
const g = document.createElementNS(ns,“g”);
g.setAttribute(“stroke”,”#00e5ff”); g.setAttribute(“stroke-width”,“1”); g.setAttribute(“fill”,“none”);
[[35,35],[85,25],[60,70],[20,80],[100,75]].forEach(([cx,cy],idx)=>{
const r=idx===0||idx===2?14:10;
// 中心円
const cc=document.createElementNS(ns,“circle”);
cc.setAttribute(“cx”,cx); cc.setAttribute(“cy”,cy); cc.setAttribute(“r”,r*0.3);
cc.setAttribute(“fill”,“rgba(0,100,150,0.4)”); g.appendChild(cc);
// 5枚の花びら
for(let i=0;i<5;i++){
const a=Math.PI*2/5*i - Math.PI/2;
const px=cx+Math.cos(a)*r*0.7, py=cy+Math.sin(a)*r*0.7;
const petal=document.createElementNS(ns,“ellipse”);
petal.setAttribute(“cx”,px); petal.setAttribute(“cy”,py);
petal.setAttribute(“rx”,r*0.35); petal.setAttribute(“ry”,r*0.55);
petal.setAttribute(“transform”,`rotate(${a*180/Math.PI+90},${px},${py})`);
petal.setAttribute(“fill”,“rgba(0,80,130,0.3)”); petal.setAttribute(“opacity”,“0.8”);
g.appendChild(petal);
}
});
svg.appendChild(g);
}

}
