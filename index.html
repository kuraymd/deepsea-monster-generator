<!DOCTYPE html>
<html lang="ja">

<head>

<title>Deep Sea Monster Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<h1>Deep Sea Monster Generator</h1>

<button onclick="generateMonster()">モンスター生成</button>

</div>

<script src="script.js"></script>
